name: deploy to prod pages

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup node env 🏗
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm generate

      - name: clone pages repo
        run: git clone https://github.com/gareth0712/gareth0712.github.io.git

      - name: Copy build output to pages repo
        run: cp -r ./.output/public/* ./gareth0712.github.io/

      - name: commit changes
        run: |
          cd ./gareth0712.github.io
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *
          git commit -m "Update pages files" || echo "No changes to commit"

      - name: Verify deploy token is present
        run: |
          if [ -z "${{ secrets.TOKEN }}" ]; then
            echo "::error::secrets.TOKEN is empty. Create a PAT with write access to gareth0712/gareth0712.github.io and save it as a repo secret named exactly TOKEN."
            exit 1
          fi
          echo "TOKEN secret is present."

      - name: Probe token access (diagnostic)
        run: |
          user=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" https://api.github.com/user | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('login', d.get('message','?')))" 2>/dev/null || echo "parse-fail")
          code=$(curl -s -o /tmp/r.json -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/gareth0712/gareth0712.github.io)
          push=$(python3 -c "import json;print(json.load(open('/tmp/r.json')).get('permissions',{}).get('push'))" 2>/dev/null || echo "?")
          echo "::error::token_user=$user | repo_api_status=$code | push_permission=$push"

      - name: Push changes
        run: |
          cd ./gareth0712.github.io
          git push "https://x-access-token:${{ secrets.TOKEN }}@github.com/gareth0712/gareth0712.github.io.git" HEAD:main
