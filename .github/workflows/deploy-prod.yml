name: deploy to prod pages

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup node env 🏗
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm generate

      - name: clone pages repo
        run: git clone https://github.com/gareth0712/gareth0712.github.io.git

      - name: Copy build output to pages repo
        run: cp -r ./.output/public/* ./gareth0712.github.io/

      - name: commit changes
        run: |
          cd ./gareth0712.github.io
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *
          git commit -m "Update pages files" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.TOKEN }}
          directory: "./gareth0712.github.io"
          repository: "gareth0712/gareth0712.github.io"
